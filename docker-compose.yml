services:
  db:
    image: postgres:18-alpine
    container_name: expressiondansebeauport-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "DockerDev@2026!"
      POSTGRES_DB: expressiondansebeauport
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -d expressiondansebeauport
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0}
    container_name: expressiondansebeauport-web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=expressiondansebeauport;Username=postgres;Password=DockerDev@2026!;"
      JwtToken__SecretKey: "f4786eb9872070cd8d8040e9e3ae01bfd0776b62219f09014451a7ec64883c63"
      JwtToken__Issuer: "http://localhost:8080"
      JwtToken__Audience: "http://localhost:8080"
      JwtToken__TokenExpiry: "720"
      SendGrid__ApiKey: "SG.docker-placeholder-key-not-for-production"
      Application__BaseUrl: "http://localhost:8080"
      Application__RedirectUrl: "http://localhost:8080"
      Cookies__Domain: "localhost"
      Cookies__Secure: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
      - backups:/app/backups

volumes:
  pgdata:
  backups:
  app-logs:
