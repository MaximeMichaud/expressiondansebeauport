version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps)"
    cooldown:
      default-days: 3
      semver-major-days: 14
    groups:
      nuget-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/src/Web/vue-app"
    schedule:
      interval: "weekly"
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    cooldown:
      default-days: 3
      semver-major-days: 14
    groups:
      npm-prod-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      npm-dev-minor-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
