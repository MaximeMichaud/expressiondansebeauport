version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - MaximeMichaud
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - MaximeMichaud
    labels:
      - dependencies
      - .NET
    cooldown:
      default-days: 3
      semver-major-days: 14
    commit-message:
      prefix: "build(deps)"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: "npm"
    directory: "/src/Web/vue-app"
    schedule:
      interval: "weekly"
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - MaximeMichaud
    labels:
      - dependencies
      - frontend
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 3
      semver-major-days: 14
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    # Groupes par écosystème pour limiter le blast radius : quand un bump
    # casse le lockfile (ex. peer deps Vite/oxc), seul ce groupe est bloqué.
    # L'ordre compte : Dependabot place un paquet dans le premier groupe
    # qui correspond, donc les patterns spécifiques doivent venir avant les
    # filets prod/dev catch-all.
    groups:
      npm-vite-ecosystem:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "@oxc-project/*"
          - "rolldown*"
        update-types:
          - minor
          - patch
      npm-vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "vue-tsc"
          - "vue-i18n"
          - "@unhead/*"
          - "pinia"
          - "pinia-*"
        update-types:
          - minor
          - patch
      npm-eslint-ecosystem:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - minor
          - patch
      npm-tiptap-ecosystem:
        patterns:
          - "@tiptap/*"
        update-types:
          - minor
          - patch
      npm-playwright-ecosystem:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "@axe-core/playwright"
          - "lighthouse"
        update-types:
          - minor
          - patch
      npm-types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
      npm-prod-minor-patch:
        dependency-type: "production"
        update-types:
          - minor
          - patch
      npm-dev-minor-patch:
        dependency-type: "development"
        update-types:
          - minor
          - patch
