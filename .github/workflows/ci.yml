name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web/vue-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/Web/vue-app/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check and build
        run: npm run build:check

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Password12!
          POSTGRES_DB: expressiondansebeauport_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d expressiondansebeauport_tests"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Configure test database
        run: cp tests/Tests.Common/appsettings.ci.json tests/Tests.Common/appsettings.json

      - run: dotnet restore

      - run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build
