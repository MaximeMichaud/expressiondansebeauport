name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CONTAINER_APP_NAME: edb-pr-${{ github.event.pull_request.number }}
  RESOURCE_GROUP: edb-preview
  CAE_NAME: edb-preview-env

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          az acr login --name edbpreview

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          APP_NAME="${{ env.CONTAINER_APP_NAME }}"
          RG="${{ env.RESOURCE_GROUP }}"
          ENV_NAME="${{ env.CAE_NAME }}"

          PREVIEW_FQDN="${APP_NAME}.$(az containerapp env show \
            --name ${ENV_NAME} \
            --resource-group ${RG} \
            --query properties.defaultDomain -o tsv)"

          cat > /tmp/container-app.yaml <<YAML
          properties:
            template:
              containers:
                - name: web
                  image: ${IMAGE}
                  resources:
                    cpu: 0.25
                    memory: 0.5Gi
                  env:
                    - name: ASPNETCORE_ENVIRONMENT
                      value: Development
                    - name: ConnectionStrings__DefaultConnection
                      value: "Host=localhost;Port=5432;Database=expressiondansebeauport;Username=postgres;Password=PreviewPg@2026!;"
                    - name: JwtToken__SecretKey
                      value: "${{ secrets.JWT_SECRET_KEY }}"
                    - name: JwtToken__Issuer
                      value: "https://${PREVIEW_FQDN}"
                    - name: JwtToken__Audience
                      value: "https://${PREVIEW_FQDN}"
                    - name: JwtToken__TokenExpiry
                      value: "720"
                    - name: Application__BaseUrl
                      value: "https://${PREVIEW_FQDN}"
                    - name: Application__RedirectUrl
                      value: "https://${PREVIEW_FQDN}"
                    - name: Cookies__Domain
                      value: "${PREVIEW_FQDN}"
                    - name: Cookies__Secure
                      value: "true"
                    - name: SendGrid__ApiKey
                      value: "SG.preview-placeholder"
                - name: postgres
                  image: docker.io/library/postgres:18-alpine
                  resources:
                    cpu: 0.25
                    memory: 0.5Gi
                  env:
                    - name: POSTGRES_USER
                      value: postgres
                    - name: POSTGRES_PASSWORD
                      value: "PreviewPg@2026!"
                    - name: POSTGRES_DB
                      value: expressiondansebeauport
            configuration:
              registries:
                - server: ${{ secrets.ACR_LOGIN_SERVER }}
                  username: ${{ secrets.ACR_USERNAME }}
                  passwordSecretRef: acr-password
              ingress:
                external: true
                targetPort: 8080
                transport: http
              secrets:
                - name: acr-password
                  value: "${{ secrets.ACR_PASSWORD }}"
              activeRevisionsMode: Single
            managedEnvironmentId: $(az containerapp env show --name ${ENV_NAME} --resource-group ${RG} --query id -o tsv)
          YAML

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/container-app.yaml

          EXISTS=$(az containerapp show \
            --name ${APP_NAME} \
            --resource-group ${RG} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name ${APP_NAME} \
              --resource-group ${RG} \
              --environment ${ENV_NAME} \
              --yaml /tmp/container-app.yaml \
              --min-replicas 0 \
              --max-replicas 1
          else
            az containerapp update \
              --name ${APP_NAME} \
              --resource-group ${RG} \
              --yaml /tmp/container-app.yaml
          fi

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.preview-url.outputs.url }} |
            | **Status** | Deployed |
            | **Commit** | `${{ github.sha }}` |

            > First request may take ~30s (cold start). Credentials: `admin@gmail.com` / `Qwerty123!`

  destroy-preview:
    if: github.event.action == 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || echo "Container app not found"

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **Status** | Destroyed |

            > Preview cleaned up on PR close.
