name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CONTAINER_APP_NAME: edb-pr-${{ github.event.pull_request.number }}
  RESOURCE_GROUP: edb-preview
  CAE_NAME: edb-preview-env

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name edbpreview

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve preview FQDN
        id: fqdn
        run: |
          DOMAIN=$(az containerapp env show \
            --name ${{ env.CAE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.defaultDomain -o tsv)
          echo "preview=${{ env.CONTAINER_APP_NAME }}.${DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Generate Container App YAML
        run: |
          cat > /tmp/containerapp.yaml <<'ENDOFYAML'
          type: Microsoft.App/containerApps
          properties:
            configuration:
              activeRevisionsMode: Single
              ingress:
                external: true
                targetPort: 8080
                transport: http
              registries:
                - server: ACR_SERVER_PLACEHOLDER
                  username: ACR_USERNAME_PLACEHOLDER
                  passwordSecretRef: acr-password
              secrets:
                - name: acr-password
                  value: ACR_PASSWORD_PLACEHOLDER
            template:
              scale:
                minReplicas: 0
                maxReplicas: 1
              containers:
                - name: web
                  image: IMAGE_PLACEHOLDER
                  resources:
                    cpu: 0.25
                    memory: 0.5Gi
                  env:
                    - name: ASPNETCORE_ENVIRONMENT
                      value: Development
                    - name: ConnectionStrings__DefaultConnection
                      value: Host=localhost;Port=5432;Database=expressiondansebeauport;Username=postgres;Password=PreviewPg2026;
                    - name: JwtToken__SecretKey
                      value: JWT_SECRET_PLACEHOLDER
                    - name: JwtToken__Issuer
                      value: ISSUER_PLACEHOLDER
                    - name: JwtToken__Audience
                      value: AUDIENCE_PLACEHOLDER
                    - name: JwtToken__TokenExpiry
                      value: "720"
                    - name: Application__BaseUrl
                      value: BASEURL_PLACEHOLDER
                    - name: Application__RedirectUrl
                      value: REDIRECT_PLACEHOLDER
                    - name: Cookies__Domain
                      value: DOMAIN_PLACEHOLDER
                    - name: Cookies__Secure
                      value: "true"
                    - name: SendGrid__ApiKey
                      value: SG.preview-placeholder
                - name: postgres
                  image: docker.io/library/postgres:18-alpine
                  resources:
                    cpu: 0.25
                    memory: 0.5Gi
                  env:
                    - name: POSTGRES_USER
                      value: postgres
                    - name: POSTGRES_PASSWORD
                      value: PreviewPg2026
                    - name: POSTGRES_DB
                      value: expressiondansebeauport
          ENDOFYAML

          # Strip heredoc indentation
          sed -i 's/^          //' /tmp/containerapp.yaml

          # Replace placeholders with actual values (avoids shell expansion issues in YAML)
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}|" /tmp/containerapp.yaml
          sed -i "s|ACR_SERVER_PLACEHOLDER|${{ secrets.ACR_LOGIN_SERVER }}|" /tmp/containerapp.yaml
          sed -i "s|ACR_USERNAME_PLACEHOLDER|${{ secrets.ACR_USERNAME }}|" /tmp/containerapp.yaml
          sed -i "s|ACR_PASSWORD_PLACEHOLDER|${{ secrets.ACR_PASSWORD }}|" /tmp/containerapp.yaml
          sed -i "s|JWT_SECRET_PLACEHOLDER|${{ secrets.JWT_SECRET_KEY }}|" /tmp/containerapp.yaml
          sed -i "s|ISSUER_PLACEHOLDER|https://${{ steps.fqdn.outputs.preview }}|" /tmp/containerapp.yaml
          sed -i "s|AUDIENCE_PLACEHOLDER|https://${{ steps.fqdn.outputs.preview }}|" /tmp/containerapp.yaml
          sed -i "s|BASEURL_PLACEHOLDER|https://${{ steps.fqdn.outputs.preview }}|" /tmp/containerapp.yaml
          sed -i "s|REDIRECT_PLACEHOLDER|https://${{ steps.fqdn.outputs.preview }}|" /tmp/containerapp.yaml
          sed -i "s|DOMAIN_PLACEHOLDER|${{ steps.fqdn.outputs.preview }}|" /tmp/containerapp.yaml

      - name: Deploy to Azure Container Apps
        run: |
          EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.CAE_NAME }} \
              --yaml /tmp/containerapp.yaml
          else
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --yaml /tmp/containerapp.yaml
          fi

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.preview-url.outputs.url }} |
            | **Status** | Deployed |
            | **Commit** | `${{ github.sha }}` |

            > First request may take ~30s (cold start). Credentials: `admin@gmail.com` / `Qwerty123!`

  destroy-preview:
    if: github.event.action == 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || echo "Container app not found"

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **Status** | Destroyed |

            > Preview cleaned up on PR close.
