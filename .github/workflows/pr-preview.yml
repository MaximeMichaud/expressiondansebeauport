name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CONTAINER_APP_NAME: edb-pr-${{ github.event.pull_request.number }}
  RESOURCE_GROUP: edb-preview
  CAE_NAME: edb-preview-env

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name edbpreview

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve preview FQDN
        id: fqdn
        run: |
          DOMAIN=$(az containerapp env show \
            --name ${{ env.CAE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.defaultDomain -o tsv)
          echo "preview=${{ env.CONTAINER_APP_NAME }}.${DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container Apps
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          PREVIEW_FQDN: ${{ steps.fqdn.outputs.preview }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          APP="${{ env.CONTAINER_APP_NAME }}"
          RG="${{ env.RESOURCE_GROUP }}"

          # Wait for any in-flight operation (from a cancelled previous run)
          for i in $(seq 1 30); do
            STATE=$(az containerapp show --name ${APP} --resource-group ${RG} \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")
            case "$STATE" in
              Succeeded|Failed|NotFound) break ;;
              *) echo "Waiting for in-flight operation (state: ${STATE}, attempt ${i}/30)..."; sleep 10 ;;
            esac
          done

          # Full desired-state YAML (single source of truth)
          cat > /tmp/app.yaml <<EOF
          properties:
            configuration:
              ingress:
                external: true
                targetPort: 8080
              registries:
              - server: ${ACR_SERVER}
                username: ${ACR_USER}
                passwordSecretRef: acr-password
              secrets:
              - name: acr-password
                value: "${ACR_PASS}"
            template:
              scale:
                minReplicas: 0
                maxReplicas: 1
              containers:
              - image: ${IMAGE}
                name: web
                resources:
                  cpu: 0.25
                  memory: 0.5Gi
                env:
                - name: ASPNETCORE_ENVIRONMENT
                  value: Development
                - name: ConnectionStrings__DefaultConnection
                  value: "Host=localhost;Port=5432;Database=expressiondansebeauport;Username=postgres;Password=PreviewPg2026;"
                - name: JwtToken__SecretKey
                  value: "${JWT_KEY}"
                - name: JwtToken__Issuer
                  value: "https://${PREVIEW_FQDN}"
                - name: JwtToken__Audience
                  value: "https://${PREVIEW_FQDN}"
                - name: JwtToken__TokenExpiry
                  value: "720"
                - name: Application__BaseUrl
                  value: "https://${PREVIEW_FQDN}"
                - name: Application__RedirectUrl
                  value: "https://${PREVIEW_FQDN}"
                - name: Cookies__Domain
                  value: "${PREVIEW_FQDN}"
                - name: Cookies__Secure
                  value: "true"
                - name: SendGrid__ApiKey
                  value: SG.preview-placeholder
              - image: docker.io/library/postgres:18-alpine
                name: postgres
                resources:
                  cpu: 0.25
                  memory: 0.5Gi
                env:
                - name: POSTGRES_USER
                  value: postgres
                - name: POSTGRES_PASSWORD
                  value: PreviewPg2026
                - name: POSTGRES_DB
                  value: expressiondansebeauport
          EOF
          sed -i 's/^          //' /tmp/app.yaml

          # Create or update with the same full YAML
          if [ "$STATE" = "NotFound" ]; then
            az containerapp create \
              --name ${APP} \
              --resource-group ${RG} \
              --environment ${{ env.CAE_NAME }} \
              --yaml /tmp/app.yaml
          else
            az containerapp update \
              --name ${APP} \
              --resource-group ${RG} \
              --yaml /tmp/app.yaml
          fi

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.preview-url.outputs.url }} |
            | **Status** | Deployed |
            | **Commit** | `${{ github.sha }}` |

            > The first request may return a **502 error** — this is expected, the environment starts on demand (cold start). Refresh after ~30 seconds. Credentials: `admin@gmail.com` / `Qwerty123!`

  destroy-preview:
    if: github.event.action == 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || echo "Container app not found"

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **Status** | Destroyed |

            > Preview cleaned up on PR close.
