name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  actions: write
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CONTAINER_APP_NAME: edb-pr-${{ github.event.pull_request.number }}
  RESOURCE_GROUP: edb-preview
  CAE_NAME: edb-preview-env

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name edbpreview

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve preview FQDN
        id: fqdn
        run: |
          DOMAIN=$(az containerapp env show \
            --name ${{ env.CAE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.defaultDomain -o tsv)
          echo "preview=${{ env.CONTAINER_APP_NAME }}.${DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container Apps
        env:
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/expressiondansebeauport:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          PREVIEW_FQDN: ${{ steps.fqdn.outputs.preview }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_SECRET_KEY }}
          # Paire VAPID factice réservée aux previews PR. La production utilise VAPID_PRIVATE_KEY.
          VAPID_SUBJECT: "mailto:preview@example.invalid"
          VAPID_PUBLIC_KEY: "BDO1sFs8EAVm_dB8B7Mw1KQsEzPHYIURL6vEBdaGV3DCslbhhXukENqIsrNlLsL5KVPhXGqpVGNzqm5xcP4AXPg"
          VAPID_PRIVATE_KEY: "67n9w--U7JzjF4e758itien7NsV8oLuGg0WSxtKwOmk"
        run: |
          APP="${{ env.CONTAINER_APP_NAME }}"
          RG="${{ env.RESOURCE_GROUP }}"
          ENV="${{ env.CAE_NAME }}"

          az containerapp delete --name ${APP} --resource-group ${RG} --yes 2>/dev/null || true

          ENV_ID=$(az containerapp env show --name ${ENV} --resource-group ${RG} --query id -o tsv)
          LOCATION=$(az containerapp env show --name ${ENV} --resource-group ${RG} --query location -o tsv)

          cat > /tmp/app.json <<EOJSON
          {
            "location": "${LOCATION}",
            "properties": {
              "managedEnvironmentId": "${ENV_ID}",
              "configuration": {
                "ingress": {
                  "external": true,
                  "targetPort": 8080
                },
                "registries": [{
                  "server": "${ACR_SERVER}",
                  "username": "${ACR_USER}",
                  "passwordSecretRef": "acr-password"
                }],
                "secrets": [{
                  "name": "acr-password",
                  "value": "${ACR_PASS}"
                }]
              },
              "template": {
                "scale": {
                  "minReplicas": 0,
                  "maxReplicas": 1
                },
                "containers": [
                  {
                    "image": "${IMAGE}",
                    "name": "web",
                    "resources": { "cpu": 0.25, "memory": "0.5Gi" },
                    "env": [
                      { "name": "ASPNETCORE_ENVIRONMENT", "value": "Development" },
                      { "name": "ConnectionStrings__DefaultConnection", "value": "Host=localhost;Port=5432;Database=expressiondansebeauport;Username=postgres;Password=PreviewPg2026;" },
                      { "name": "JwtToken__SecretKey", "value": "${JWT_KEY}" },
                      { "name": "JwtToken__Issuer", "value": "https://${PREVIEW_FQDN}" },
                      { "name": "JwtToken__Audience", "value": "https://${PREVIEW_FQDN}" },
                      { "name": "JwtToken__TokenExpiry", "value": "720" },
                      { "name": "Application__BaseUrl", "value": "https://${PREVIEW_FQDN}" },
                      { "name": "Application__RedirectUrl", "value": "https://${PREVIEW_FQDN}" },
                      { "name": "Cookies__Domain", "value": "${PREVIEW_FQDN}" },
                      { "name": "Cookies__Secure", "value": "true" },
                      { "name": "SendGrid__ApiKey", "value": "SG.preview-placeholder" },
                      { "name": "Vapid__Subject", "value": "${VAPID_SUBJECT}" },
                      { "name": "Vapid__PublicKey", "value": "${VAPID_PUBLIC_KEY}" },
                      { "name": "Vapid__PrivateKey", "value": "${VAPID_PRIVATE_KEY}" }
                    ]
                  },
                  {
                    "image": "docker.io/library/postgres:18-alpine",
                    "name": "postgres",
                    "resources": { "cpu": 0.25, "memory": "0.5Gi" },
                    "env": [
                      { "name": "POSTGRES_USER", "value": "postgres" },
                      { "name": "POSTGRES_PASSWORD", "value": "PreviewPg2026" },
                      { "name": "POSTGRES_DB", "value": "expressiondansebeauport" }
                    ]
                  }
                ]
              }
            }
          }
          EOJSON

          SUBSCRIPTION=$(az account show --query id -o tsv)
          az rest --method PUT \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION}/resourceGroups/${RG}/providers/Microsoft.App/containerApps/${APP}?api-version=2024-03-01" \
            --body @/tmp/app.json

      - name: Wait for provisioning
        run: |
          STATE=""
          for i in $(seq 1 30); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
            echo "Provisioning state: ${STATE} (attempt ${i}/30)"
            case "$STATE" in
              Succeeded) break ;;
              Failed) echo "Provisioning failed"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          if [ "$STATE" != "Succeeded" ]; then
            echo "Provisioning did not reach Succeeded (last state: ${STATE})"
            exit 1
          fi

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          if [ -z "$FQDN" ]; then
            echo "Empty FQDN returned by Azure, ingress not ready"
            exit 1
          fi
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Smoke test preview
        run: |
          URL="${{ steps.preview-url.outputs.url }}/api/health"
          for i in $(seq 1 30); do
            CODE=$(curl -sS -o /tmp/preview-health.txt -w "%{http_code}" --max-time 20 "$URL" || true)
            echo "Health status: ${CODE} (attempt ${i}/30)"
            if [ "$CODE" = "200" ]; then
              cat /tmp/preview-health.txt
              exit 0
            fi
            if [ -s /tmp/preview-health.txt ]; then
              head -c 500 /tmp/preview-health.txt || true
              echo
            fi
            sleep 10
          done
          echo "Preview health check failed"
          exit 1

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.preview-url.outputs.url }} |
            | **Status** | Deployed |
            | **Commit** | `${{ github.sha }}` |

            > The first request may return a **502 error** — this is expected, the environment starts on demand (cold start). Refresh after ~30 seconds. Credentials: `admin@gmail.com` / `Qwerty123!`

  destroy-preview:
    if: github.event.action == 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || echo "Container app not found"

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            ## Preview Environment

            | | |
            |---|---|
            | **Status** | Destroyed |

            > Preview cleaned up on PR close.
